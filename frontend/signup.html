<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – SmartAgro</title>
      <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-white/20 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-teal-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
                <span class="text-xl font-bold bg-gradient-to-r from-green-600 to-teal-600 bg-clip-text text-transparent">SmartAgro</span>
            </div>
            <div class="hidden md:flex gap-8">
                <a href="index.html" class="text-gray-700 hover:text-green-600 transition duration-200">Home</a>
                <a href="features.html" class="text-gray-700 hover:text-green-600 transition duration-200">Features</a>
                <a href="how-it-works.html" class="text-gray-700 hover:text-green-600 transition duration-200">How It Works</a>
            </div>
        </div>
    </nav>

    <!-- Signup Container -->
    <div class="min-h-screen pt-20 pb-20 flex items-center justify-center px-4 relative overflow-hidden">
        <!-- Background Gradient -->
        <div class="absolute inset-0 bg-gradient-to-br from-emerald-50 via-sky-50 to-teal-50 -z-10"></div>
        <div class="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-green-300/20 to-teal-300/20 rounded-full blur-3xl -z-10"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-gradient-to-tr from-teal-300/20 to-blue-300/20 rounded-full blur-3xl -z-10"></div>

        <!-- Centered glassmorphic signup card -->
        <div class="w-full max-w-md">
            <div class="bg-white/70 backdrop-blur-md rounded-3xl p-8 border border-white/40 shadow-2xl shadow-green-300/20">
                <h1 class="text-3xl font-bold text-center mb-2 bg-gradient-to-r from-green-600 to-teal-600 bg-clip-text text-transparent">Create Account</h1>
                <p class="text-center text-gray-600 mb-8">Join SmartAgro and get AI-powered farming advice</p>

                <form id="signupForm" onsubmit="handleSignup(event)">
                    <!-- Full Name -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                        <input id="fullName" type="text" placeholder="" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition" required>
                    </div>

                    <!-- Phone Number -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
                        <input id="phone" type="tel" placeholder="" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                        <input id="signupEmail" type="email" placeholder="you@email.com" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                        <input id="signupPassword" type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition" required>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                        <input id="confirmPassword" type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition" required>
                    </div>

                    <!-- User Role -->
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">I am a</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer flex-1 p-3 bg-white/40 border border-white/60 rounded-lg hover:bg-white/60 transition">
                                <input type="radio" name="role" value="farmer" checked required class="w-4 h-4 text-green-600">
                                <span class="font-semibold text-gray-700">Farmer</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer flex-1 p-3 bg-white/40 border border-white/60 rounded-lg hover:bg-white/60 transition">
                                <input type="radio" name="role" value="guest" required class="w-4 h-4 text-green-600">
                                <span class="font-semibold text-gray-700">Guest</span>
                            </label>
                        </div>
                    </div>
                    <!-- Error Box -->
                         <div id="signupError"
                             class="hidden mb-4 text-sm text-red-700 bg-red-100 border border-red-300 rounded-lg px-3 py-2">
                         </div>
                    <!-- Sign Up Button -->
                    <button type="submit" class="w-full py-3 bg-gradient-to-r from-green-500 to-teal-600 text-white font-semibold rounded-lg shadow-lg shadow-green-500/30 hover:shadow-xl hover:shadow-green-500/50 hover:-translate-y-0.5 transition duration-200 mb-4">
                        Create Account
                    </button>
                </form>

                <!-- Login Link -->
                <p class="text-center text-gray-600">
                    Already have an account?
                    <a href="login.html" class="text-green-600 font-semibold hover:text-teal-600 transition">Login here</a>
                </p>
            </div>
        </div>
    </div>

   <script>
function handleSignup(event) {
    event.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!fullName || !email || !password || !confirmPassword) {
        alert("Please fill all the fields.");
        return;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match. Please re-enter.");
        return;
    }

    // Fake account creation – demo only
    alert("Account created successfully for " + fullName + ". Please login to continue.");

    // Redirect to login page
    window.location.href = "login.html";
}
</script>
</body>
</html>
